services:
  - type: web
    name: amats-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: amats-strategy-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -u strategy_engine.py
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
